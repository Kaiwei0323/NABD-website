# Nginx config for https://inventecna.com
# 1. Copy this file to /etc/nginx/sites-available/inventecna and fix paths below.
# 2. Use absolute paths for SSL and root (replace /home/inventec/Documents/NABD-website with your project path).
# 3. Build frontend once: npm run build. Then set root to /home/inventec/Documents/NABD-website/dist.
# 4. Enable site: sudo ln -s /etc/nginx/sites-available/inventecna /etc/nginx/sites-enabled && sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name inventecna.com www.inventecna.com;

    # SSL (use absolute paths, e.g. /home/inventec/Documents/NABD-website/ssl/...)
    ssl_certificate     /home/inventec/Documents/NABD-website/ssl/domain.cert.pem;
    ssl_certificate_key /home/inventec/Documents/NABD-website/ssl/private.key.pem;

    # Frontend: serve built static files from dist/
    root /home/inventec/Documents/NABD-website/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: proxy to Node backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Optional: redirect HTTP to HTTPS (uncomment only if port 80 is not used by Apache/other)
